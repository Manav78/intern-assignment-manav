version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: assignment-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: assignment_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: assignment-redis
    ports:
      - "6379:6379"